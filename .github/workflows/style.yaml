name: Style

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  style:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # 4.0.1
      with:
        version: 2026.5.0
        install: true
        cache: true

    - name: check style
      run: mise run check:format
